function openPrintView(postEl) {
  // Grab data from DOM
  const title = document.querySelector(".fancy-title")?.innerText || "Beitrag";
  const authorEl = postEl.querySelector(".first-post .creator a, .names .first a, .username a");
  const author = authorEl ? authorEl.innerText : "Unbekannt";
  const dateEl = postEl.querySelector(".post-date, time");
  const rawDate = dateEl ? dateEl.getAttribute("datetime") || dateEl.getAttribute("title") || dateEl.innerText : "";
  const date = rawDate ? new Date(rawDate).toLocaleDateString("de-DE", { year: "numeric", month: "2-digit", day: "2-digit" }) : "";
  const cooked = postEl.querySelector(".cooked")?.innerHTML || "";
  const url = window.location.href.split("?")[0];

  const html = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>${title}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 22mm 24mm 22mm 24mm; }
  @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'Noto Sans', sans-serif; color: #222; font-size: 9.5pt; line-height: 1.7; }

  .header { padding-bottom: 6mm; margin-bottom: 6mm; border-bottom: 0.5pt solid #ddd; }
  .header img { width: 22px; height: 22px; margin-bottom: 6mm; }
  .header h1 { font-size: 20pt; font-weight: 700; color: #111; line-height: 1.15; margin-bottom: 3mm; }
  .header .meta { font-size: 8pt; color: #888; }

  .content h1 { font-size: 15pt; font-weight: 700; color: #111; margin: 8mm 0 3mm; break-after: avoid; }
  .content h2 { font-size: 12pt; font-weight: 600; color: #111; margin: 7mm 0 2.5mm; break-after: avoid; }
  .content h3 { font-size: 10pt; font-weight: 600; color: #444; margin: 5mm 0 2mm; break-after: avoid; }
  .content h4 { font-size: 9.5pt; font-weight: 600; color: #444; margin: 4mm 0 1.5mm; break-after: avoid; }
  .content p { margin-bottom: 3mm; orphans: 3; widows: 3; }
  .content a { color: #1a6baa; text-decoration: none; }
  .content strong { font-weight: 600; color: #111; }

  .content ul, .content ol { margin: 2mm 0 4mm 5mm; padding-left: 4mm; }
  .content li { margin-bottom: 1.5mm; font-size: 9pt; }

  .content blockquote { border-left: 2pt solid #ccc; padding: 2mm 0 2mm 5mm; margin: 4mm 0; color: #444; font-style: italic; break-inside: avoid; }
  .content blockquote p { color: #444; margin-bottom: 2mm; }

  .content pre { background: #f5f5f5; border: 0.5pt solid #ddd; padding: 3mm; margin: 3mm 0; font-size: 8pt; line-height: 1.5; break-inside: avoid; }
  .content code { font-family: 'SF Mono', Consolas, monospace; font-size: 8pt; }
  .content p code, .content li code { background: #f5f5f5; padding: 0 1.5mm; }
  .content pre code { background: none; }

  .content table { width: 100%; border-collapse: collapse; margin: 4mm 0; font-size: 8.5pt; break-inside: avoid; }
  .content thead th { text-align: left; padding: 2mm 3mm; border-bottom: 1pt solid #222; font-weight: 600; font-size: 8pt; }
  .content tbody td { padding: 2mm 3mm; border-bottom: 0.5pt solid #ddd; vertical-align: top; }

  .content hr { border: none; border-top: 0.5pt solid #ddd; margin: 5mm 0; }
  .content img { max-width: 100%; height: auto; margin: 3mm 0; }
  .content .lightbox-wrapper .meta { display: none; }
  .content .onebox { border: 0.5pt solid #ddd; padding: 3mm; margin: 3mm 0; break-inside: avoid; }

  .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 0 24mm; display: flex; justify-content: space-between; align-items: center; font-size: 6.5pt; color: #aaa; }
  .footer a { color: #aaa; text-decoration: none; }
  .footer .center { position: absolute; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>

<div class="footer">
  <span>outoftheb-ox.de</span>
  <span class="center"><a href="${url}">${url}</a></span>
  <span></span>
</div>

<div class="header">
  <img src="${OX_LOGO}">
  <h1>${title}</h1>
  <div class="meta">${author} &middot; ${date} &middot; campus.outoftheb-ox.de</div>
</div>

<div class="content">${cooked}</div>

</body>
</html>`;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
  // Wait for fonts to load, then print
  setTimeout(() => w.print(), 600);
}

// Add print button to each post's action bar
api.addPostMenuButton("printPdf", (attrs) => {
  return {
    action: "printPost",
    icon: "print",
    className: "print-post-btn",
    title: "post.controls.print_pdf",
    position: "second-last-hidden",
  };
});

api.attachWidgetAction("post-menu", "printPost", function () {
  const postEl = document.getElementById("post_" + this.attrs.post_number);
  if (postEl) openPrintView(postEl);
});

</script>
